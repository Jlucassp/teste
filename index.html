<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Botão Play</title>
        <style>
            .btn-play::before {
                content: "";
                display: inline-block;
                width: 0;
                height: 0;
                border-left: 10px solid white;
                border-top: 6px solid transparent;
                border-bottom: 6px solid transparent;
                margin-right: 8px;
            }
            .tooltip {
                position: relative;
                cursor: help;
                border-bottom: 1px dashed #333;
            }

            .tooltip::after {
                content: attr(data-tooltip);
                position: absolute;
                bottom: 125%;
                left: 50%;
                transform: translateX(-50%);
                background: #333;
                color: white;
                padding: 8px 12px;
                border-radius: 4px;
                font-size: 14px;
                white-space: nowrap;
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.3s ease;
            }

            .tooltip:hover::after {
                opacity: 1;
            }
        </style>
    </head>
    <body>
        <button class="btn-play">Reproduzir</button>

        <br /><br />

        <span class="tooltip" data-tooltip="Essa é uma dica útil!">
            Passe o mouse aqui
        </span>
    </body>
</html>
